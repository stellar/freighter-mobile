---
# Workaround for a GitHub Actions limitation where workflows triggered by the
# default GITHUB_TOKEN (e.g. PRs opened by github-actions[bot]) do not
# automatically trigger other workflows such as the test suite.
# This workflow pushes an empty commit to the PR branch to force test execution.
name: Bot PR Tests Trigger

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  push_trigger_commit:
    # SECURITY: Both conditions are required.
    # - Bot check: prevents running on human-authored PRs.
    # - Repo match: prevents execution on fork PRs where the head
    #   branch could contain untrusted code.
    # Defense-in-depth: the checkout step pins `repository:` to the
    # PR head repo, and a follow-up step verifies the remote matches
    # the origin. This ensures that even if this guard is weakened,
    # the workflow cannot push arbitrary code to same-repo branches.
    if: >-
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    name: Push trigger commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Verify checkout matches origin
        env:
          EXPECTED_REMOTE: ${{ github.event.repository.clone_url }}
        run: |
          ACTUAL_REMOTE=$(git remote get-url origin)
          if [ "$ACTUAL_REMOTE" != "$EXPECTED_REMOTE" ]; then
            echo "❌ Error: Checkout remote does not match origin repository."
            exit 1
          fi

      - name: Push empty trigger commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Trigger Tests"
          git push
