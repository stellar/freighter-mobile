---
name: New Release

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: App version to bump to (e.g. 1.10.24)
        required: true
        type: string
      branch_from:
        description:
          Branch this release from (Default is `main`. For emergency releases,
          enter the tag version to branch from, e.g. 1.9.24. Available tag
          versions will be shown in the workflow logs if validation fails.)
        required: true
        type: string
        default: "main"

permissions:
  contents: write
  pull-requests: write

jobs:
  create_release_branch:
    name: Prepare Release Branch
    runs-on: ubuntu-latest

    env:
      BRANCH_FROM: ${{ inputs.branch_from }}

    steps:
      - name: Validate and normalize app version
        id: normalize_version
        env:
          RAW_APP_VERSION: ${{ inputs.app_version }}
        run: |
          APP_VERSION="$RAW_APP_VERSION"
          # Remove "v" prefix if user included it
          APP_VERSION=$(echo "$APP_VERSION" | sed 's/^v//')
          # Validate version format (e.g., 1.10.24)
          if [[ ! "$APP_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Error: Invalid version format. Expected format: 1.10.24 or v1.10.24"
            exit 1
          fi
          echo "app_version=${APP_VERSION}" >> $GITHUB_OUTPUT
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "✓ Using normalized version: ${APP_VERSION}"

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate and get available tags
        id: validate_branch_from
        uses: ./.github/actions/validate-branch-from
        with:
          branch_from: ${{ env.BRANCH_FROM }}

      - name: Determine branch names
        id: set_branches
        env:
          VALIDATED_BRANCH_FROM:
            ${{ steps.validate_branch_from.outputs.branch_or_tag }}
          NORMALIZED_APP_VERSION:
            ${{ steps.normalize_version.outputs.app_version }}
        run: |
          BRANCH_FROM="$VALIDATED_BRANCH_FROM"
          APP_VERSION="$NORMALIZED_APP_VERSION"

          if [ "$BRANCH_FROM" = "main" ]; then
            RELEASE_BRANCH="release"
          else
            RELEASE_BRANCH="emergency-release"
          fi

          VERSION_BRANCH="v${APP_VERSION}"

          echo "release_branch=${RELEASE_BRANCH}" >> $GITHUB_OUTPUT
          echo "version_branch=${VERSION_BRANCH}" >> $GITHUB_OUTPUT
          echo "RELEASE_BRANCH=${RELEASE_BRANCH}" >> $GITHUB_ENV
          echo "VERSION_BRANCH=${VERSION_BRANCH}" >> $GITHUB_ENV
          echo "Using release branch: ${RELEASE_BRANCH}"
          echo "Using version branch: ${VERSION_BRANCH}"

      - name: Create and push release branch
        env:
          VALIDATED_BRANCH_FROM:
            ${{ steps.validate_branch_from.outputs.branch_or_tag }}
          STEP_RELEASE_BRANCH: ${{ steps.set_branches.outputs.release_branch }}
        run: |
          BRANCH_FROM="$VALIDATED_BRANCH_FROM"
          RELEASE_BRANCH="$STEP_RELEASE_BRANCH"

          if [ "$BRANCH_FROM" = "main" ]; then
            git checkout main
            git pull origin main
          else
            # For tags, checkout the tag directly
            git checkout "$BRANCH_FROM"
          fi

          if git ls-remote --heads origin "$RELEASE_BRANCH" | grep -q "$RELEASE_BRANCH"; then
            echo "❌ Error: Branch '$RELEASE_BRANCH' already exists on remote."
            echo "Please delete the '$RELEASE_BRANCH' branch before starting a new release."
            exit 1
          fi

          git checkout -b "$RELEASE_BRANCH"
          git push --set-upstream origin "$RELEASE_BRANCH"

      - name: Create version branch
        env:
          STEP_VERSION_BRANCH: ${{ steps.set_branches.outputs.version_branch }}
        run: |
          VERSION_BRANCH="$STEP_VERSION_BRANCH"

          if git ls-remote --heads origin "$VERSION_BRANCH" | grep -q "$VERSION_BRANCH"; then
            echo "❌ Error: Branch '$VERSION_BRANCH' already exists on remote."
            echo "Please delete the '$VERSION_BRANCH' branch before starting a new release."
            exit 1
          fi

          git checkout -b "$VERSION_BRANCH"

      - name: Update app version
        env:
          NORMALIZED_APP_VERSION:
            ${{ steps.normalize_version.outputs.app_version }}
        run: |
          APP_VERSION="$NORMALIZED_APP_VERSION"
          node ./scripts/set-app-version "$APP_VERSION"

      - name: Generate release notes
        id: release_notes_step
        run: |
          set -eo pipefail

          OUTPUT_DELIM="__RELEASE_DESCRIPTION__"

          # For emergency releases (not from main), use simpler release notes
          if [ "$BRANCH_FROM" != "main" ]; then
            release_notes="Use this branch to push the emergency fix. Please replace this PR description with a description of the fix after it has been pushed."

            {
              echo "release_notes<<$OUTPUT_DELIM"
              echo "$release_notes"
              echo "$OUTPUT_DELIM"
            } >> "$GITHUB_OUTPUT"

            {
              echo "RELEASE_NOTES<<$OUTPUT_DELIM"
              echo "$release_notes"
              echo "$OUTPUT_DELIM"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          # For regular releases from main, generate release notes from commits
          # Find the latest version tag (e.g., v1.8.24)
          # Use --sort=-version:refname to sort tags by version in descending order
          last_release_tag=$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)

          if [ -n "$last_release_tag" ]; then
            echo "Found last release tag: $last_release_tag"
            commits=$(git log "${last_release_tag}..HEAD" --pretty=format:'- %s' --no-merges 2>/dev/null || true)
          else
            echo "No release tag found, including all commits"
            commits=$(git log --pretty=format:'- %s' --no-merges 2>/dev/null || true)
          fi

          commits=$(printf '%s\n' "$commits" | sed '/^$/d')

          if [ -z "$commits" ]; then
            commits="- No commits since last release"
          fi

          printf -v release_notes '## Release Changes\n\n%s' "$commits"
          release_notes=${release_notes%$'\n'}

          {
            echo "release_notes<<$OUTPUT_DELIM"
            echo "$release_notes"
            echo "$OUTPUT_DELIM"
          } >> "$GITHUB_OUTPUT"

          {
            echo "RELEASE_NOTES<<$OUTPUT_DELIM"
            echo "$release_notes"
            echo "$OUTPUT_DELIM"
          } >> "$GITHUB_ENV"

      - name: Commit changes
        env:
          NORMALIZED_APP_VERSION:
            ${{ steps.normalize_version.outputs.app_version }}
        run: |
          APP_VERSION="$NORMALIZED_APP_VERSION"
          git status
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected after running set-app-version."
            exit 1
          fi
          git add .
          git commit -m "chore: bump app version to v${APP_VERSION}"

      - name: Push version branch
        env:
          STEP_VERSION_BRANCH: ${{ steps.set_branches.outputs.version_branch }}
        run: |
          VERSION_BRANCH="$STEP_VERSION_BRANCH"
          git push --set-upstream origin "$VERSION_BRANCH"

      - name: Create pull request
        id: create_pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          APP_VERSION: ${{ steps.normalize_version.outputs.app_version }}
          RELEASE_BRANCH: ${{ steps.set_branches.outputs.release_branch }}
          VERSION_BRANCH: ${{ steps.set_branches.outputs.version_branch }}
          BRANCH_FROM: ${{ steps.validate_branch_from.outputs.branch_or_tag }}
        with:
          script: |
            const releaseBranch = process.env.RELEASE_BRANCH;
            const versionBranch = process.env.VERSION_BRANCH;
            const branchFrom = process.env.BRANCH_FROM;
            const isEmergencyRelease = branchFrom !== "main";
            const title = isEmergencyRelease 
              ? `[Emergency Release] v${process.env.APP_VERSION}`
              : `v${process.env.APP_VERSION}`;
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
            const releaseNotes = process.env.RELEASE_NOTES || "";
            const trimmedBody = releaseNotes.trim();
            const body = trimmedBody.length > 0 ? releaseNotes : `Automated release for v${process.env.APP_VERSION}.`;

            async function setOutputs(pr) {
              core.notice(`Pull request ready: ${pr.html_url}`);
              core.setOutput("pr_number", pr.number.toString());
              core.setOutput("pr_url", pr.html_url);
            }

            try {
              const { data } = await github.rest.pulls.create({
                owner,
                repo,
                head: versionBranch,
                base: releaseBranch,
                title,
                body
              });
              await setOutputs(data);
            } catch (error) {
              if (error.status === 422) {
                core.warning(`Pull request could not be created automatically: ${error.message}`);
                const { data: existing } = await github.rest.pulls.list({
                  owner,
                  repo,
                  head: `${owner}:${versionBranch}`,
                  base: releaseBranch,
                  state: "open"
                });

                if (existing.length > 0) {
                  await setOutputs(existing[0]);
                } else {
                  throw error;
                }
              } else {
                throw error;
              }
            }

      # Bump version on main only for regular releases (not emergency)
      # to avoid inconsistencies on the main branch
      - name: Create bump-version branch
        if: env.BRANCH_FROM == 'main'
        run: |
          git checkout main
          git pull origin main

          if git ls-remote --heads origin bump-version | grep -q bump-version; then
            echo "❌ Error: Branch 'bump-version' already exists on remote."
            echo "Please delete the 'bump-version' branch before starting a new release."
            exit 1
          fi

          git checkout -b bump-version

      - name: Update app version on bump-version branch
        if: env.BRANCH_FROM == 'main'
        env:
          NORMALIZED_APP_VERSION:
            ${{ steps.normalize_version.outputs.app_version }}
        run: |
          APP_VERSION="$NORMALIZED_APP_VERSION"
          node ./scripts/set-app-version "$APP_VERSION"

      - name: Commit version bump on bump-version branch
        if: env.BRANCH_FROM == 'main'
        env:
          NORMALIZED_APP_VERSION:
            ${{ steps.normalize_version.outputs.app_version }}
        run: |
          APP_VERSION="$NORMALIZED_APP_VERSION"
          git status
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected after running set-app-version."
            exit 1
          fi
          git add .
          git commit -m "chore: bump app version to v${APP_VERSION}"

      - name: Push bump-version branch
        if: env.BRANCH_FROM == 'main'
        run: |
          git push --set-upstream origin bump-version

      - name: Create bump-version pull request
        if: env.BRANCH_FROM == 'main'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          APP_VERSION: ${{ steps.normalize_version.outputs.app_version }}
        with:
          script: |
            const version = process.env.APP_VERSION;
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
            const title = `Bump version to v${version} [merge now]`;
            const body = `Bumping version on \`main\` branch to \`v${version}\`.`;

            async function setOutputs(pr) {
              core.notice(`Bump version pull request ready: ${pr.html_url}`);
              core.setOutput("bump_version_pr_number", pr.number.toString());
              core.setOutput("bump_version_pr_url", pr.html_url);
            }

            try {
              const { data } = await github.rest.pulls.create({
                owner,
                repo,
                head: "bump-version",
                base: "main",
                title,
                body
              });
              await setOutputs(data);
            } catch (error) {
              if (error.status === 422) {
                core.warning(`Bump version pull request could not be created automatically: ${error.message}`);
                const { data: existing } = await github.rest.pulls.list({
                  owner,
                  repo,
                  head: `${owner}:bump-version`,
                  base: "main",
                  state: "open"
                });

                if (existing.length > 0) {
                  await setOutputs(existing[0]);
                } else {
                  throw error;
                }
              } else {
                throw error;
              }
            }

      # Only trigger dev builds for regular releases from main branch
      # Emergency releases branching from previous release skip initial QA builds
      # as they should be manually triggered after the emergency fixes are pushed
      - name: Trigger dev builds (initial QA)
        if: env.BRANCH_FROM == 'main'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          APP_VERSION: ${{ steps.normalize_version.outputs.app_version }}
          VERSION_BRANCH: ${{ steps.set_branches.outputs.version_branch }}
        with:
          script: |
            const versionBranch = process.env.VERSION_BRANCH;
            const rawNotes = process.env.RELEASE_NOTES || "";
            const releaseNotes = rawNotes.trim().length > 0 ? rawNotes : "";
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");

            const workflows = [
              {
                workflow_id: "ios.yml",
                name: "iOS Release",
                inputs: {
                  ref_name: versionBranch,
                  buildEnv: "dev",
                  upload_to_testflight: "yes",
                  release_notes: releaseNotes
                }
              },
              {
                workflow_id: "android.yml",
                name: "Android Release",
                inputs: {
                  ref_name: versionBranch,
                  buildEnv: "dev",
                  upload_to_google_play: "yes",
                  release_notes: releaseNotes
                }
              }
            ];

            for (const workflow of workflows) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: workflow.workflow_id,
                ref: versionBranch,
                inputs: workflow.inputs
              });
              core.notice(`Triggered ${workflow.name} workflow (${workflow.workflow_id}) for ${versionBranch}`);
            }
