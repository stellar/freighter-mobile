appId: org.stellar.freighterdev
tags:
  - lock-screen
  - forgot-password
---
# Create a wallet so there is an account to forget
- runFlow:
    file: ../onboarding/CreateWallet.yaml

# Wait for home screen to fully settle after wallet creation
- extendedWaitUntil:
    visible:
      id: e2e-open-settings
    timeout: 15000

# Open settings and tap the "Logout" option. logout() without wipeAllData=true
# puts the app into AUTH_STATUS.LOCKED and navigates to the Lock Screen.
- tapOn:
    id: e2e-open-settings
- extendedWaitUntil:
    visible:
      id: logout-button
    timeout: 10000
- tapOn:
    id: logout-button
- extendedWaitUntil:
    visible:
      id: lock-screen
    timeout: 30000

# Dismiss keyboard auto-focused by the password input, then tap "Forgot password"
- hideKeyboard
- tapOn:
    id: forgot-password-button
- extendedWaitUntil:
    visible:
      id: forgot-password-warning-modal
    timeout: 5000
- assertVisible:
    id: forgot-password-warning-cancel-button
- assertVisible:
    id: forgot-password-warning-continue-button

# Tapping Cancel dismisses the sheet; user stays on the Lock Screen
- tapOn:
    id: forgot-password-warning-cancel-button
- extendedWaitUntil:
    notVisible:
      id: forgot-password-warning-modal
    timeout: 5000
- assertVisible:
    id: lock-screen

# Reopen, confirm, and verify we land back on the Welcome screen
- tapOn:
    id: forgot-password-button
- extendedWaitUntil:
    visible:
      id: forgot-password-warning-modal
    timeout: 5000
- tapOn:
    id: forgot-password-warning-continue-button
- extendedWaitUntil:
    visible:
      id: welcome-screen
    timeout: 30000
