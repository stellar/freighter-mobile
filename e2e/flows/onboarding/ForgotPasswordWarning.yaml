appId: org.stellar.freighterdev
tags:
  - lock-screen
  - forgot-password
---
# Launch app and wait for welcome screen; retry up to 3 times (2 min wait each) if not visible
- retry:
    maxRetries: 2
    commands:
      - launchApp:
          clearState: true
          clearKeychain: true
      - extendedWaitUntil:
          visible:
            id: welcome-screen
          timeout: 120000 # 2 minutes

# Create a wallet so there is an account to forget
- tapOn:
    id: create-wallet-button

- assertVisible:
    id: password-input
- tapOn:
    id: password-input
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: default-action-button

- assertVisible:
    id: confirm-password-input
- tapOn:
    id: confirm-password-input
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: default-action-button

# Recovery phrase alert screen - tap continue
- tapOn:
    id: default-action-button

# Skip recovery phrase verification
- assertVisible:
    id: recovery-phrase-container
- tapOn:
    id: skip-button
- tapOn:
    id: skip-confirm-button

- extendedWaitUntil:
    visible:
      id: home-screen|welcome-banner-dismiss-button
    timeout: 30000

# Dismiss welcome banner if it appears after wallet creation
- runFlow:
    when:
      visible:
        id: welcome-banner-dismiss-button
    commands:
      - tapOn:
          id: welcome-banner-dismiss-button
      - extendedWaitUntil:
          visible:
            id: home-screen
          timeout: 10000

# Open settings and tap the "Logout" option. logout() without wipeAllData=true
# puts the app into AUTH_STATUS.LOCKED and navigates to the Lock Screen.
- tapOn:
    id: e2e-open-settings
- extendedWaitUntil:
    visible:
      id: logout-button
    timeout: 10000
- tapOn:
    id: logout-button
- extendedWaitUntil:
    visible:
      id: lock-screen
    timeout: 30000

# Tap "Forgot password" and verify the warning sheet
- tapOn:
    id: forgot-password-button
- extendedWaitUntil:
    visible:
      id: forgot-password-warning-modal
    timeout: 5000
- assertVisible:
    id: forgot-password-warning-cancel-button
- assertVisible:
    id: forgot-password-warning-continue-button

# Tapping Cancel dismisses the sheet; user stays on the Lock Screen
- tapOn:
    id: forgot-password-warning-cancel-button
- extendedWaitUntil:
    notVisible:
      id: forgot-password-warning-modal
    timeout: 5000
- assertVisible:
    id: lock-screen

# Reopen, confirm, and verify we land back on the Welcome screen
- tapOn:
    id: forgot-password-button
- extendedWaitUntil:
    visible:
      id: forgot-password-warning-modal
    timeout: 5000
- tapOn:
    id: forgot-password-warning-continue-button
- extendedWaitUntil:
    visible:
      id: welcome-screen
    timeout: 30000
