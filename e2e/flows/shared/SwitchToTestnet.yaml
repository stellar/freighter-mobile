appId: org.stellar.freighterdev
---
# Shared flow: switch the active network to Testnet, called right after the
# wallet has been imported. Exits back to home screen. Used by the transaction
# flows that run on testnet (Send/Swap, FromDetails) and by the standalone
# ImportAndSwitchToTestnet flow.
#
# Freshly imported wallets always land on Mainnet where the account is unfunded,
# so the "Welcome to Freighter!" bottom sheet appears every time and covers the
# header (including the e2e-open-settings button). And if the Mainnet account
# fetch flakes, an "Account not loaded" toast appears at the top and also
# overlays the header. Both are handled here so the network-switch tap is
# never blocked.
#
# Timeouts on the network-switch UI are generous (15s) for the post-switch
# back-nav because the app refetches balances on the new network.

# 1. Wait for the home screen to reach a steady post-load state — either the
#    "Welcome to Freighter!" bottom sheet (fresh testnet-only account shown as
#    unfunded on Mainnet) or the XLM balance row (static funded Mainnet account
#    already loaded). Both are end-states, not the racy "home-screen rendered"
#    signal that the calling flows used to wait for.
- extendedWaitUntil:
    visible:
      id: home-token-XLM|welcome-banner-dismiss-button
    timeout: 30000

# 2. Dismiss the welcome bottom sheet if it appeared (only for fresh accounts
#    that present as unfunded on Mainnet).
- runFlow:
    when:
      visible:
        id: welcome-banner-dismiss-button
    commands:
      - tapOn:
          id: welcome-banner-dismiss-button
      - extendedWaitUntil:
          visible:
            id: home-screen
          timeout: 15000

# 3. If the Mainnet account fetch hiccupped, an "Account not loaded" toast
#    overlays the top of the header. Swipe it away (auto-dismisses in 6s
#    anyway, but this is faster and deterministic).
- runFlow:
    when:
      visible: ".*could not be loaded.*"
    commands:
      - swipe:
          from:
            text: ".*could not be loaded.*"
          direction: UP

# 4. Open settings from the home screen (E2E only button)
- tapOn:
    id: e2e-open-settings

# Wait for change network button to be visible (confirms settings screen loaded)
- extendedWaitUntil:
    visible:
      id: change-network-button
    timeout: 15000

# Open change network screen
- tapOn:
    id: change-network-button

- extendedWaitUntil:
    visible:
      id: change-network-selector
    timeout: 15000

# Open network selector bottom sheet
- tapOn:
    id: change-network-selector

- extendedWaitUntil:
    visible:
      id: change-network-option-testnet
    timeout: 15000

- tapOn:
    id: change-network-option-testnet

# Return to home screen
- tapOn:
    id: header-button

- extendedWaitUntil:
    visible:
      id: change-network-button
    timeout: 15000

- tapOn:
    id: header-button

- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 15000
