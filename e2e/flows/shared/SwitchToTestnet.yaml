appId: org.stellar.freighterdev
---
# Shared flow: switch the active network to Testnet (entered from home screen,
# exits back to home screen). Used by the WalletConnect mock-dapp flows, by the
# transaction flows that run on testnet (Send/Swap), and by the standalone
# ImportAndSwitchToTestnet flow.
#
# Timeouts are intentionally generous (15s) for the post-switch back-nav waits
# because the app refetches balances on the new network, which can briefly
# slow UI updates.

# Open settings from the home screen (E2E only button)
- tapOn:
    id: e2e-open-settings

# Wait for change network button to be visible (confirms settings screen loaded)
- extendedWaitUntil:
    visible:
      id: change-network-button
    timeout: 15000

# Open change network screen
- tapOn:
    id: change-network-button

- extendedWaitUntil:
    visible:
      id: change-network-selector
    timeout: 15000

# Open network selector bottom sheet
- tapOn:
    id: change-network-selector

- extendedWaitUntil:
    visible:
      id: change-network-option-testnet
    timeout: 15000

- tapOn:
    id: change-network-option-testnet

# Return to home screen
- tapOn:
    id: header-button

- extendedWaitUntil:
    visible:
      id: change-network-button
    timeout: 15000

- tapOn:
    id: header-button

- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 15000
