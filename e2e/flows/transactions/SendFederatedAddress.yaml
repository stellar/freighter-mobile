appId: org.stellar.freighterdev
tags:
  - transactions
  - send
  - federation
  - mainnet
---
# Send 0.000001 XLM and 0.000001 USDC on mainnet to a federated address
# (freighter.pb*lobstr.co). Verifies that federation address resolution works
# end-to-end for both native and classic tokens under the linearized send
# flow: token select → recipient search/resolve → amount → review → confirm.
#
# Uses a small amount to avoid wasting mainnet funds.

# Import funded wallet
- runFlow:
    file: ../onboarding/ImportFundedWallet.yaml

# Wait for either home screen or banner to appear
- extendedWaitUntil:
    visible:
      id: home-screen|welcome-banner-dismiss-button
    timeout: 30000

# Dismiss welcome banner if visible
- runFlow:
    when:
      visible:
        id: welcome-banner-dismiss-button
    commands:
      - tapOn:
          id: welcome-banner-dismiss-button
      - extendedWaitUntil:
          visible:
            id: home-screen
          timeout: 30000

# Stay on mainnet (no network switch)

# Verify we're on home screen after import
- assertVisible:
    id: home-screen

# Ensure we're on the Home tab (funded wallets open on History)
- tapOn:
    id: tab-home

# Wait for accounts and balances to load
- extendedWaitUntil:
    visible:
      id: home-account-switcher
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: icon-button-send
    timeout: 15000

# ── XLM send ───────────────────────────────────────────────────────────────

# Navigate to send flow — new linearized flow opens token selection first
- tapOn:
    id: icon-button-send

# Select XLM token
- extendedWaitUntil:
    visible:
      id: token-option-XLM
    timeout: 30000
- tapOn:
    id: token-option-XLM

# Wait for recipient search screen
- extendedWaitUntil:
    visible:
      id: send-search-contacts-screen
    timeout: 15000

# Type a federation address (LOBSTR federation)
- tapOn:
    id: send-recipient-input
- inputText: freighter.pb*lobstr.co

# Wait for federation resolution and search suggestion to appear
- extendedWaitUntil:
    visible:
      id: search-suggestion-0
    timeout: 30000
- tapOn:
    id: search-suggestion-0

# Verify we're on amount screen (federation resolved successfully)
- extendedWaitUntil:
    visible:
      id: send-amount-screen
    timeout: 15000

# Enter amount: 0.000001 XLM (minimal to avoid wasting mainnet funds)
- tapOn:
    id: send-amount-focus-trigger
- inputText: "0.000001"

# Dismiss the keyboard on Android so the Review button is not obscured
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard

# Tap Review button — this is where the bug manifested (federation address
# was passed to buildPaymentTransaction instead of the resolved G... key)
- tapOn:
    id: send-continue-button

# Verify review sheet is visible (confirms federation address was correctly
# resolved to a G... public key for transaction building)
- extendedWaitUntil:
    visible:
      id: send-review-sheet
    timeout: 30000
# Wait for the confirm button to be enabled (transaction built + memo validated)
- extendedWaitUntil:
    visible:
      id: send-review-confirm-button
      enabled: true
    timeout: 30000
- tapOn:
    id: send-review-confirm-button

# Wait for completion and tap Done
- extendedWaitUntil:
    visible:
      id: send-processing-done-button
    timeout: 30000
- tapOn:
    id: send-processing-done-button

# Verify we're back on history screen with transaction visible
# Note: optional because the transaction might not be immediately rendered in the view
- assertVisible:
    text: "XLM"
    optional: true

# ── USDC send ──────────────────────────────────────────────────────────────
# Start a second send to the same federation address using USDC.

# Navigate back to Home tab (processing screen returns to History)
- tapOn:
    id: tab-home
- extendedWaitUntil:
    visible:
      id: icon-button-send
    timeout: 15000

# Navigate to send flow
- tapOn:
    id: icon-button-send

# Select USDC token
- extendedWaitUntil:
    visible:
      id: token-option-USDC
    timeout: 30000
- tapOn:
    id: token-option-USDC

# Wait for recipient search screen
- extendedWaitUntil:
    visible:
      id: send-search-contacts-screen
    timeout: 15000

# Type the federation address again
- tapOn:
    id: send-recipient-input
- inputText: freighter.pb*lobstr.co

# Wait for federation resolution
- extendedWaitUntil:
    visible:
      id: search-suggestion-0
    timeout: 30000
- tapOn:
    id: search-suggestion-0

# Back on amount screen — enter 0.000001 USDC
- extendedWaitUntil:
    visible:
      id: send-amount-screen
    timeout: 15000
- tapOn:
    id: send-amount-focus-trigger
- inputText: "0.000001"

# Dismiss the keyboard on Android so the Review button is not obscured
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard

# Review and confirm
- tapOn:
    id: send-continue-button
- extendedWaitUntil:
    visible:
      id: send-review-sheet
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: send-review-confirm-button
      enabled: true
    timeout: 30000
- tapOn:
    id: send-review-confirm-button

# Wait for completion and tap Done
- extendedWaitUntil:
    visible:
      id: send-processing-done-button
    timeout: 30000
- tapOn:
    id: send-processing-done-button

- assertVisible:
    text: "USDC"
    optional: true
