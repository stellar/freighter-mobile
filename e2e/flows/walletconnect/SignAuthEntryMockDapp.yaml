appId: org.stellar.freighterdev
tags:
  - walletconnect
  - sign-auth-entry
  - mock-dapp
  - e2e
---
# SignAuthEntry Mock Dapp E2E Test - Happy Path
# Tests basic WalletConnect SignAuthEntry flow with approval on mainnet
#
- runFlow:
    file: ../onboarding/ImportFundedWallet.yaml

# Dismiss welcome banner if it appears after import
- runFlow:
    when:
      visible:
        id: welcome-banner-dismiss-button
    commands:
      - tapOn:
          id: welcome-banner-dismiss-button
      - extendedWaitUntil:
          visible:
            id: home-screen
          timeout: 5000

# Dismiss welcome banner if it appears again
- runFlow:
    when:
      visible:
        id: welcome-banner-dismiss-button
    commands:
      - tapOn:
          id: welcome-banner-dismiss-button
      - extendedWaitUntil:
          visible:
            id: home-screen
          timeout: 5000

# Open WC E2E Helper FAB and create session
- tapOn:
    id: wc-e2e-helper-fab

# Wait for bottom sheet animation to complete
- scroll

# Tap Create Session button
- tapOn:
    id: wc-e2e-create-session

# Wait for session to be created
- extendedWaitUntil:
    visible:
      id: wc-e2e-copy-uri
    timeout: 5000

# Copy WC URI to clipboard (modal will auto-close)
- tapOn:
    id: wc-e2e-copy-uri

# Wait for modal to close
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 3000

# Navigate to QR scanner
- tapOn:
    id: home-screen-scan-button

# Wait for QR scanner to load - manual input is always visible for WalletConnect
- extendedWaitUntil:
    visible:
      id: walletconnect-uri-input-end-button
    timeout: 5000

# Paste WC URI
- tapOn:
    id: walletconnect-uri-input-end-button

# Wait for connect button and tap it
- extendedWaitUntil:
    visible:
      id: walletconnect-connect-button
    timeout: 3000

- tapOn:
    id: walletconnect-connect-button

# Wait for session proposal
- extendedWaitUntil:
    visible:
      id: session-proposal-confirm-button
    timeout: 20000

# Tap confirm button
- tapOn:
    id: session-proposal-confirm-button

# Wait for connection approval
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 10000

# Request sign auth entry using WC E2E Helper
- tapOn:
    id: wc-e2e-helper-fab

# Wait for modal to open and button to be visible.
# Don't scroll — the auth entry button is near the top of the modal content
# (above the message inputs), so a scroll gesture would move it out of view.
- extendedWaitUntil:
    visible:
      id: wc-e2e-request-sign-auth-entry
    timeout: 3000

# Request sign auth entry - modal will auto-close after request
- tapOn:
    id: wc-e2e-request-sign-auth-entry

# Wait for SignAuthEntry modal
- extendedWaitUntil:
    visible:
      id: sign-auth-entry-title
    timeout: 10000

# Verify buttons are visible on main confirm screen
- assertVisible:
    id: dapp-auth-entry-details-button
- assertVisible:
    id: dapp-request-confirm-button

# Approve the signature
- tapOn:
    id: dapp-request-confirm-button

# Verify we're back on home screen
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 5000
