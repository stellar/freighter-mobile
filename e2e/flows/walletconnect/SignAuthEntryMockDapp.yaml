appId: org.stellar.freighterdev
tags:
  - walletconnect
  - sign-auth-entry
  - mock-dapp
  - e2e
---
# SignAuthEntry Mock Dapp E2E Test - Happy Path
# Tests basic WalletConnect SignAuthEntry flow with approval on mainnet
#
# Requires env var: E2E_TEST_SOROBAN_AUTH_ENTRY_XDR
#   A base64-encoded SorobanAuthorizationEntry XDR with sorobanCredentialsAddress credentials.
#   Can be generated with:
#     node -e "
#       const { xdr, Keypair } = require('@stellar/stellar-sdk');
#       const kp = Keypair.random();
#       const addr = xdr.ScAddress.scAddressTypeAccount(
#         xdr.AccountId.publicKeyTypeEd25519(kp.rawPublicKey())
#       );
#       const entry = new xdr.SorobanAuthorizationEntry({
#         credentials: xdr.SorobanCredentials.sorobanCredentialsAddress(
#           new xdr.SorobanAddressCredentials({
#             address: addr,
#             nonce: xdr.Int64.fromString('0'),
#             signatureExpirationLedger: 999999,
#             signature: xdr.ScVal.scvVoid(),
#           })
#         ),
#         rootInvocation: new xdr.SorobanAuthorizedInvocation({
#           function: xdr.SorobanAuthorizedFunction.sorobanAuthorizedFunctionTypeContractFn(
#             new xdr.InvokeContractArgs({
#               contractAddress: xdr.ScAddress.scAddressTypeContract(Buffer.alloc(32)),
#               functionName: 'test',
#               args: [],
#             })
#           ),
#           subInvocations: [],
#         }),
#       });
#       console.log(entry.toXDR('base64'));
#     "

- runFlow:
    file: ../onboarding/ImportFundedWallet.yaml

# Dismiss welcome banner if it appears after import
- runFlow:
    when:
      visible:
        id: welcome-banner-dismiss-button
    commands:
      - tapOn:
          id: welcome-banner-dismiss-button
      - extendedWaitUntil:
          visible:
            id: home-screen
          timeout: 5000

# Dismiss welcome banner if it appears again
- runFlow:
    when:
      visible:
        id: welcome-banner-dismiss-button
    commands:
      - tapOn:
          id: welcome-banner-dismiss-button
      - extendedWaitUntil:
          visible:
            id: home-screen
          timeout: 5000

# Open WC E2E Helper FAB and create session
- tapOn:
    id: wc-e2e-helper-fab

# Wait for bottom sheet animation to complete
- scroll

# Tap Create Session button
- tapOn:
    id: wc-e2e-create-session

# Wait for session to be created
- extendedWaitUntil:
    visible:
      id: wc-e2e-copy-uri
    timeout: 5000

# Copy WC URI to clipboard (modal will auto-close)
- tapOn:
    id: wc-e2e-copy-uri

# Wait for modal to close
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 3000

# Navigate to QR scanner
- tapOn:
    id: home-screen-scan-button

# Wait for QR scanner to load - manual input is always visible for WalletConnect
- extendedWaitUntil:
    visible:
      id: walletconnect-uri-input-end-button
    timeout: 5000

# Paste WC URI
- tapOn:
    id: walletconnect-uri-input-end-button

# Wait for connect button and tap it
- extendedWaitUntil:
    visible:
      id: walletconnect-connect-button
    timeout: 3000

- tapOn:
    id: walletconnect-connect-button

# Wait for session proposal
- extendedWaitUntil:
    visible:
      id: session-proposal-confirm-button
    timeout: 20000

# Tap confirm button
- tapOn:
    id: session-proposal-confirm-button

# Wait for connection approval
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 10000

# Request sign auth entry using WC E2E Helper
- tapOn:
    id: wc-e2e-helper-fab

# Wait for modal to open and show inputs
- scroll

# Fill in the auth entry XDR (from env var for CI, or hardcoded for local testing)
- tapOn:
    id: wc-e2e-auth-entry-input

- inputText: "${E2E_TEST_SOROBAN_AUTH_ENTRY_XDR}"

# Note: no hideKeyboard here — on Android, hideKeyboard sends KEYCODE_BACK which
# can trigger onRequestClose on the React Native Modal if the keyboard is already
# dismissed. The ScrollView uses keyboardShouldPersistTaps="handled" so button
# taps fire correctly even when the keyboard is visible.

# Request sign auth entry - modal will auto-close after request
- tapOn:
    id: wc-e2e-request-sign-auth-entry

# Wait for SignAuthEntry modal
- extendedWaitUntil:
    visible:
      id: sign-auth-entry-title
    timeout: 10000

# Verify auth entry display and buttons are visible
- assertVisible:
    id: auth-entry-display
- assertVisible:
    id: dapp-request-confirm-button

# Approve the signature
- tapOn:
    id: dapp-request-confirm-button

# Verify we're back on home screen
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 5000
