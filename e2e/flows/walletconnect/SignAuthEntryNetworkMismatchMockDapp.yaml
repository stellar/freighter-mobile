appId: org.stellar.freighterdev
tags:
  - walletconnect
  - sign-auth-entry
  - network-mismatch
  - security
  - mock-dapp
  - e2e
---
# SignAuthEntry Network Mismatch Mock Dapp E2E Test
# Security test: dApp sends a stellar_signAuthEntry request where the
# HashIdPreimage embeds the OPPOSITE network's networkId (e.g., mainnet
# preimage delivered over a stellar:testnet WC session).
# Expected: wallet detects the mismatch and shows an error toast WITHOUT
# presenting the signing sheet.

- runFlow:
    file: ../onboarding/ImportFundedWallet.yaml

# Dismiss welcome banner if it appears after import
- runFlow:
    when:
      visible:
        id: welcome-banner-dismiss-button
    commands:
      - tapOn:
          id: welcome-banner-dismiss-button
      - extendedWaitUntil:
          visible:
            id: home-screen
          timeout: 5000

# Dismiss welcome banner if it appears again
- runFlow:
    when:
      visible:
        id: welcome-banner-dismiss-button
    commands:
      - tapOn:
          id: welcome-banner-dismiss-button
      - extendedWaitUntil:
          visible:
            id: home-screen
          timeout: 5000

# Open WC E2E Helper FAB and create session
- tapOn:
    id: wc-e2e-helper-fab

# Wait for bottom sheet animation to complete
- scroll

# Tap Create Session button
- tapOn:
    id: wc-e2e-create-session

# Wait for session to be created
- extendedWaitUntil:
    visible:
      id: wc-e2e-copy-uri
    timeout: 5000

# Copy WC URI to clipboard (modal will auto-close)
- tapOn:
    id: wc-e2e-copy-uri

# Wait for modal to close
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 3000

# Navigate to QR scanner
- tapOn:
    id: home-screen-scan-button

# Wait for QR scanner to load - manual input is always visible for WalletConnect
- extendedWaitUntil:
    visible:
      id: walletconnect-uri-input-end-button
    timeout: 5000

# Paste WC URI
- tapOn:
    id: walletconnect-uri-input-end-button

# Wait for connect button and tap it
- extendedWaitUntil:
    visible:
      id: walletconnect-connect-button
    timeout: 3000

- tapOn:
    id: walletconnect-connect-button

# Wait for session proposal
- extendedWaitUntil:
    visible:
      id: session-proposal-confirm-button
    timeout: 20000

# Tap confirm button
- tapOn:
    id: session-proposal-confirm-button

# Wait for connection approval
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 10000

# Open WC E2E Helper and send a wrong-network auth entry request
- tapOn:
    id: wc-e2e-helper-fab

# Wait for the wrong-network button to be visible.
# It appears in the first visible section (above the message inputs), so no scroll needed.
- extendedWaitUntil:
    visible:
      id: wc-e2e-request-sign-auth-entry-wrong-network
    timeout: 3000

# Send wrong-network auth entry — modal will auto-close after request
- tapOn:
    id: wc-e2e-request-sign-auth-entry-wrong-network

# Wallet pre-validation should reject the request immediately and show an error toast.
# The signing sheet must NOT appear.
- extendedWaitUntil:
    visible:
      text: "Authorization entry is for a different network"
    timeout: 10000
