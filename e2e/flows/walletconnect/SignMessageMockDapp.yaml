appId: org.stellar.freighterdev
tags:
  - walletconnect
  - sign-message
  - mock-dapp
  - e2e
---
# SignMessage Mock Dapp E2E Test - Happy Path
# Tests basic WalletConnect SignMessage flow with approval on mainnet

- runFlow:
    file: ../onboarding/ImportFundedWallet.yaml

# Dismiss welcome banner if it appears after import
- runFlow:
    when:
      visible:
        id: welcome-banner-dismiss-button
    commands:
      - tapOn:
          id: welcome-banner-dismiss-button
      - extendedWaitUntil:
          visible:
            id: home-screen
          timeout: 5000

# Dismiss welcome banner if it appears again
- runFlow:
    when:
      visible:
        id: welcome-banner-dismiss-button
    commands:
      - tapOn:
          id: welcome-banner-dismiss-button
      - extendedWaitUntil:
          visible:
            id: home-screen
          timeout: 5000

# Open WC E2E Helper FAB and create session
- tapOn:
    id: wc-e2e-helper-fab

# Wait for bottom sheet animation to complete
- scroll

# Tap Create Session button
- tapOn:
    id: wc-e2e-create-session

# Wait for session to be created
- extendedWaitUntil:
    visible:
      id: wc-e2e-copy-uri
    timeout: 5000

# Pair directly via WC E2E helper (modal will auto-close after pairing)
- tapOn:
    id: wc-e2e-pair-uri

# Wait for session proposal
- extendedWaitUntil:
    visible:
      id: session-proposal-confirm-button
    timeout: 20000

# Tap confirm button
- tapOn:
    id: session-proposal-confirm-button

# Wait for connection approval
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 10000

# Request sign message using WC E2E Helper
- tapOn:
    id: wc-e2e-helper-fab

# Wait for modal to open and message input to be visible
- extendedWaitUntil:
    visible:
      id: wc-e2e-message-input
    timeout: 5000

# Fill in message
- tapOn:
    id: wc-e2e-message-input

- inputText:
    "Hello from E2E test! Please sign this message to verify your wallet."

# Dismiss keyboard before tapping the sign button. hideKeyboard is safe here
# because the keyboard IS visible (just typed text) — on Android KEYCODE_BACK
# only triggers onRequestClose when the keyboard is already dismissed.
- hideKeyboard

# Make sure the sign button is visible (scroll if needed) and tap it to send the WC request
- scrollUntilVisible:
    element:
      id: wc-e2e-request-sign
    direction: DOWN

# Request sign message - modal will auto-close after request
- tapOn:
    id: wc-e2e-request-sign

# Wait for SignMessage modal
- extendedWaitUntil:
    visible:
      id: sign-message-title
    timeout: 10000

# Verify message and buttons are visible
- assertVisible:
    id: message-display
- assertVisible:
    id: dapp-request-confirm-button

# Approve the signature
- tapOn:
    id: dapp-request-confirm-button

# Verify success toast appears
- extendedWaitUntil:
    visible:
      text: "Message successfully signed!"
    timeout: 5000
